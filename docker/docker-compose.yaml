# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CQ Pipeline — Full Stack Docker Compose
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Services:
#   - api: FastAPI dashboard backend
#   - db: PostgreSQL database
#   - sonarqube: SonarQube server (optional)
#   - sonarqube-db: SonarQube PostgreSQL (optional)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

services:
  # ─── FastAPI Dashboard API ──────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - CQ_DATABASE_URL=postgresql+asyncpg://cqpipeline:cqpipeline@db:5432/cqpipeline
      - CQ_DEBUG=false
      - CQ_CORS_ORIGINS=["http://localhost:3000","http://localhost:8000"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
      - frontend
    restart: unless-stopped

  # ─── PostgreSQL Database ────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cqpipeline
      POSTGRES_USER: cqpipeline
      POSTGRES_PASSWORD: cqpipeline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cqpipeline"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    restart: unless-stopped

  # ─── SonarQube (Optional) ──────────────────────────────────────
  sonarqube:
    image: sonarqube:10-community
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      sonarqube-db:
        condition: service_healthy
    networks:
      - backend
      - frontend
    restart: unless-stopped
    profiles:
      - sonarqube  # Only start with: docker compose --profile sonarqube up

  sonarqube-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sonar
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    restart: unless-stopped
    profiles:
      - sonarqube

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_db_data:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
