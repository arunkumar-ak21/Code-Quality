# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CQ Pipeline — Custom Secret Detection Patterns
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# These patterns supplement the built-in patterns from Gitleaks and detect-secrets.
# Add your organization-specific patterns here.

patterns:
  # ─── Cloud Provider Keys ─────────────────────────────────────────
  - id: "aws-access-key"
    description: "AWS Access Key ID"
    regex: '(?i)(AKIA[0-9A-Z]{16})'
    severity: "critical"
    keywords: ["AKIA"]

  - id: "aws-secret-key"
    description: "AWS Secret Access Key"
    regex: '(?i)aws_secret_access_key\s*[=:]\s*["\']?([A-Za-z0-9/+=]{40})["\']?'
    severity: "critical"
    keywords: ["aws_secret"]

  - id: "gcp-service-account"
    description: "GCP Service Account Key"
    regex: '"type":\s*"service_account"'
    severity: "critical"
    keywords: ["service_account"]

  - id: "azure-storage-key"
    description: "Azure Storage Account Key"
    regex: '(?i)AccountKey\s*=\s*([A-Za-z0-9+/=]{88})'
    severity: "critical"
    keywords: ["AccountKey"]

  # ─── API Keys & Tokens ──────────────────────────────────────────
  - id: "openai-api-key"
    description: "OpenAI API Key"
    regex: 'sk-[a-zA-Z0-9]{20}T3BlbkFJ[a-zA-Z0-9]{20}'
    severity: "critical"
    keywords: ["sk-"]

  - id: "github-token"
    description: "GitHub Personal Access Token"
    regex: '(ghp_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9]{22}_[a-zA-Z0-9]{59})'
    severity: "critical"
    keywords: ["ghp_", "github_pat_"]

  - id: "github-oauth"
    description: "GitHub OAuth Access Token"
    regex: 'gho_[a-zA-Z0-9]{36}'
    severity: "critical"
    keywords: ["gho_"]

  - id: "gitlab-token"
    description: "GitLab Access Token"
    regex: 'glpat-[a-zA-Z0-9\-]{20}'
    severity: "critical"
    keywords: ["glpat-"]

  - id: "slack-token"
    description: "Slack Bot/User Token"
    regex: 'xox[bpors]-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9]{24,32}'
    severity: "critical"
    keywords: ["xoxb-", "xoxp-"]

  - id: "slack-webhook"
    description: "Slack Webhook URL"
    regex: 'https://hooks\.slack\.com/services/T[a-zA-Z0-9]{8,}/B[a-zA-Z0-9]{8,}/[a-zA-Z0-9]{24}'
    severity: "high"
    keywords: ["hooks.slack.com"]

  - id: "stripe-key"
    description: "Stripe API Key"
    regex: '(sk_live_[a-zA-Z0-9]{24,}|rk_live_[a-zA-Z0-9]{24,})'
    severity: "critical"
    keywords: ["sk_live_", "rk_live_"]

  - id: "stripe-publishable"
    description: "Stripe Publishable Key"
    regex: 'pk_live_[a-zA-Z0-9]{24,}'
    severity: "medium"
    keywords: ["pk_live_"]

  - id: "twilio-api-key"
    description: "Twilio API Key"
    regex: 'SK[a-f0-9]{32}'
    severity: "critical"
    keywords: ["SK"]

  - id: "sendgrid-api-key"
    description: "SendGrid API Key"
    regex: 'SG\.[a-zA-Z0-9_-]{22}\.[a-zA-Z0-9_-]{43}'
    severity: "critical"
    keywords: ["SG."]

  # ─── Authentication Tokens ──────────────────────────────────────
  - id: "jwt-token"
    description: "JSON Web Token"
    regex: 'eyJ[a-zA-Z0-9_-]*\.eyJ[a-zA-Z0-9_-]*\.[a-zA-Z0-9_-]*'
    severity: "high"
    keywords: ["eyJ"]

  - id: "bearer-token"
    description: "Bearer Token in Header"
    regex: '(?i)(bearer\s+[a-zA-Z0-9_\-\.=]+)'
    severity: "high"
    keywords: ["bearer"]

  - id: "basic-auth"
    description: "Basic Auth Credentials"
    regex: '(?i)(basic\s+[a-zA-Z0-9+/=]{10,})'
    severity: "high"
    keywords: ["basic"]

  # ─── Database Credentials ───────────────────────────────────────
  - id: "db-connection-string"
    description: "Database Connection String"
    regex: '(?i)(postgres|mysql|mongodb|redis|mssql)://[^\s"'']+:[^\s"'']+@[^\s"'']+'
    severity: "critical"
    keywords: ["://"]

  - id: "password-assignment"
    description: "Hardcoded Password Assignment"
    regex: '(?i)(password|passwd|pwd|secret)\s*[=:]\s*["\'][^"'']{6,}["\']'
    severity: "high"
    keywords: ["password", "passwd", "secret"]

  # ─── Private Keys ──────────────────────────────────────────────
  - id: "private-key-rsa"
    description: "RSA Private Key"
    regex: '-----BEGIN RSA PRIVATE KEY-----'
    severity: "critical"
    keywords: ["BEGIN RSA PRIVATE KEY"]

  - id: "private-key-ec"
    description: "EC Private Key"
    regex: '-----BEGIN EC PRIVATE KEY-----'
    severity: "critical"
    keywords: ["BEGIN EC PRIVATE KEY"]

  - id: "private-key-openssh"
    description: "OpenSSH Private Key"
    regex: '-----BEGIN OPENSSH PRIVATE KEY-----'
    severity: "critical"
    keywords: ["BEGIN OPENSSH PRIVATE KEY"]

  - id: "private-key-generic"
    description: "Generic Private Key"
    regex: '-----BEGIN PRIVATE KEY-----'
    severity: "critical"
    keywords: ["BEGIN PRIVATE KEY"]

  # ─── Miscellaneous ─────────────────────────────────────────────
  - id: "google-api-key"
    description: "Google API Key"
    regex: 'AIza[0-9A-Za-z_-]{35}'
    severity: "critical"
    keywords: ["AIza"]

  - id: "firebase-key"
    description: "Firebase API Key"
    regex: 'AAAA[a-zA-Z0-9_-]{7}:[a-zA-Z0-9_-]{140}'
    severity: "critical"
    keywords: ["AAAA"]

  - id: "mailgun-api-key"
    description: "Mailgun API Key"
    regex: 'key-[a-zA-Z0-9]{32}'
    severity: "high"
    keywords: ["key-"]

# ─── Entropy Detection ──────────────────────────────────────────────
entropy:
  enabled: true
  # Minimum entropy threshold for flagging (Shannon entropy, bits)
  # Higher = fewer false positives, lower = more catches
  hex_threshold: 3.5
  base64_threshold: 4.5
  # Minimum string length for entropy analysis
  min_length: 8
  # Maximum string length
  max_length: 200
