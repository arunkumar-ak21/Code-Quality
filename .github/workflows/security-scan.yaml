# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CQ Pipeline — GitHub Actions: PR Security Scan
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Runs on every PR and push to main/develop.
# Blocks merge if critical/high findings are detected.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: "🛡️ Security & Quality Scan"

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # ─── Secret Detection ──────────────────────────────────────────
  secret-scan:
    name: "🔐 Secret Detection"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Full Pipeline Scan ────────────────────────────────────────
  pipeline-scan:
    name: "🛡️ Full Pipeline Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install CQ Pipeline
        run: |
          pip install -e ".[scanners]"

      - name: Install external tools
        run: |
          # Gitleaks
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.22.1/gitleaks_8.22.1_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin/ gitleaks

          # Semgrep
          pip install semgrep

      - name: Run Pipeline Scan
        id: scan
        run: |
          cq-pipeline scan --all --format all --log-level INFO
        continue-on-error: true

      - name: Upload JSON Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-report-json
          path: reports/*.json
          retention-days: 30

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-report-html
          path: reports/*.html
          retention-days: 30

      - name: Post PR Comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const glob = require('glob');

            // Find the latest JSON report
            const reports = glob.sync('reports/*.json');
            if (reports.length === 0) {
              console.log('No report found');
              return;
            }

            const report = JSON.parse(fs.readFileSync(reports[reports.length - 1], 'utf8'));
            const verdict = report.verdict.toUpperCase();
            const emoji = verdict === 'PASS' ? '✅' : verdict === 'FAIL' ? '❌' : '⚠️';

            const body = `## ${emoji} CQ Pipeline — Security & Quality Scan

            | Metric | Value |
            |--------|-------|
            | **Verdict** | ${emoji} ${verdict} |
            | **Total Findings** | ${report.total_findings} |
            | **Critical** | 🔴 ${report.critical_count} |
            | **High** | 🟠 ${report.high_count} |
            | **Medium** | 🟡 ${report.medium_count} |
            | **Low** | 🔵 ${report.low_count} |
            | **Duration** | ${report.duration_seconds}s |
            | **Files Scanned** | ${report.files_scanned} |

            📄 [Download full report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

      - name: Fail on Critical Issues
        if: steps.scan.outcome == 'failure'
        run: |
          echo "❌ Pipeline scan found critical issues — blocking merge"
          exit 1

  # ─── Dependency Audit ──────────────────────────────────────────
  dependency-audit:
    name: "📦 Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[all]"

      - name: Run pip-audit
        run: pip-audit --format json --output reports/pip-audit.json || true

      - name: Upload Audit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-audit
          path: reports/pip-audit.json
          retention-days: 30
